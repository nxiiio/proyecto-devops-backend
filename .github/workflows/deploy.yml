name: Deploy Backend

on:
  push:
    branches:
      - deploy

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/innovatech-backend:latest .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/innovatech-backend:latest

      - name: Deploy on EC2 Backend through bastion
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.FRONTEND_EC2_HOST }}
          username: ${{ secrets.FRONTEND_EC2_USER }}
          key: ${{ secrets.FRONTEND_EC2_SSH_KEY }}
          script: |
            ssh -o StrictHostKeyChecking=no -i ~/innovatech.pem ${{ secrets.BACKEND_EC2_USER }}@${{ secrets.BACKEND_PRIVATE_IP }} << 'EOF'
              cd ~/proyecto-devops-backend
              git pull origin deploy || git pull origin main
              docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
              docker compose pull
              docker compose down
              docker compose up -d
              docker ps
            EOF
